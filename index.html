<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PENALTY SHOT - STREAK MULTIPLIER CRASH</title>
    <style>
        /* 🎨 পেনাল্টি শট নিওন গ্রিন থিম সিএসএস ফ্রেম ইনজেকশন ভাই ভাই */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #05070c; font-family: 'Segoe UI', Roboto, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; user-select: none; }
        .header { display: none !important; } 
        
        body { 
            background: radial-gradient(circle at center, #06140c 0%, #020503 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100vh; 
            position: relative;
        }

        /* 🏟️ ওরিজিনাল পেনাল্টি নেট এরিনা ক্যানভাস Wrapper */
        .game-stadium-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 310px;
            margin: 15px auto 0 auto;
            background: linear-gradient(180deg, #091a10 0%, #030805 100%);
            border: 4px solid #00ff88;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0,255,136,0.25), inset 0 0 25px rgba(0,0,0,0.9);
            padding: 15px 12px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* 📢 লাইভ মেসেজ প্যানেল বার */
        .win-status-container { position: relative; z-index: 10; text-align: center; padding: 10px; margin: 4px 12px; background: rgba(9, 12, 18, 0.6); border-radius: 10px; border: 1px solid rgba(255,255,255,0.02); }
        #win-text-msg { font-size: 12px; font-weight: 700; color: #00ff88; letter-spacing: 0.3px; }

        /* 🎛️ নিচের মেইন গেম কন্ট্রোল প্যানেল ফুটার (মোবাইলের ফুল ফ্রেমে ওয়ান-শটে ওপরে লিফটিং লক ওস্তাদ!) */
        .footer-controls { position: relative; z-index: 50; background: #07090e; border-top: 1px solid #161b29; padding: 20px 15px 50px 15px; box-shadow: 0 -8px 25px rgba(0,0,0,0.7); }
        .play-section { display: flex; justify-content: space-between; align-items: center; gap: 10px; max-width: 450px; margin: 0 auto; margin-bottom: 25px; }
        .bet-btn-nav { background: #111522; border: 1px solid #20293d; color: #00ff88; font-size: 18px; font-weight: 800; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .play-btn { flex: 1; background: linear-gradient(180deg, #00ff88 0%, #008f4c 100%); color: #000; font-size: 16px; font-weight: 900; border: none; padding: 12px 0; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,255,136,0.3); transition: all 0.15s ease; }
        .play-btn:active { transform: scale(0.96); }
        .play-btn:disabled { background: #141721 !important; border-color: #1f2536 !important; color: #4b5563 !important; box-shadow: none !important; cursor: not-allowed; }

        .win-glow-bar { border-color: rgba(0, 255, 136, 0.4) !important; background: rgba(0, 255, 136, 0.05) !important; }
        .win-glow-bar #win-text-msg { color: #00ff88 !important; }
        .lose-glow-bar { border-color: rgba(255, 51, 102, 0.4) !important; background: rgba(255, 51, 102, 0.05) !important; }
        .lose-glow-bar #win-text-msg { color: #ff3366 !important; }
    </style>
</head>
<body>

    <!-- 🔒 [🔒 মেইন লাইভ ব্যালেন্স উইজেট ইন্টারসেপ্টর বর্ম ভাই ভাই]: ওরিজিনাল সাইটের রাইট সাইডের ডাইনামিক গ্রিন বক্স ক্যানভাস লক! -->
    <div style="position: absolute; top: 12px; right: 12px; z-index: 100; pointer-events: none; display: none;">
        <span id="user-balance">0.00</span>
    </div>

    <!-- 🏟️ ওরিজিনাল পেনাল্টি স্টেডিয়াম এরিনা ক্যানভাস Wrapper -->
    <div class="game-stadium-wrapper">
        <div style="text-align: center; color: #00ff88; font-weight: 900; margin-bottom: 20px;">⚽ PENALTY SHOT STADIUM Active</div>
        <!-- গোলপোস্ট ও ইন্টারঅ্যাক্টিভ টার্গেট ক্যানভাস এরিয়া ফ্রেম -->
        <div id="penalty-strait-grid" style="display: flex; flex-direction: column; align-items: center; gap: 40px; margin-top: 30px;">
            <div style="color: #aaa; font-size: 13px;">[গোলপোস্ট টার্গেট জোন ১০০% ওয়ান-শটে রেডি ওস্তাদ]</div>
            <div style="font-size: 24px; animation: pulse 1.5s infinite;">🎯 🥅 🧤</div>
        </div>
    </div>

    <!-- 📢 উইন-লস লাইভ ক্যাসিনো মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">বেট সিলেক্ট করে গোলপোস্টের টার্গেটে শট মারুন ভাই, স্ট্রেইক মাল্টিপ্লায়ার অন ফায়ার!</span>
    </div>

    <!-- 🎛️ বাজি ও অ্যাকশন কন্ট্রোল প্যানেল ফুটার বার -->
    <div class="footer-controls">
        <div class="play-section">
            <button class="bet-btn-nav" onclick="adjustBet('minus')">-</button>
            <div style="text-align: center; width: 65px;">
                <div style="font-size: 9px; color: #aaa; font-weight: bold;">STAKE</div>
                <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
            </div>
            <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>

            <button class="play-btn" id="spin-btn" onclick="handlePenaltyKickShoot()">SHOOT</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // 🔒 [🔒 মাল্টি-প্যারামিটার ট্র্যাকিং বর্ম]: userId, id বা username যা-ই আসুক, ওয়ান-শটে ডাটাবেজের সাথে টাইট লক!
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "logged_in_player";
        const urlWallet = urlParams.get('wallet') || "main";
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let isSpinning = false;

        // 💰 লাইভ অ্যাকাউন্ট ওরিজিনাল মেইন ওয়ালেট ব্যালেন্স পুশ ড্রাইভার মেথড
        async function fetchLivePlayerBalanceSync() {
            try {
                const res = await fetch(`${SERVER_URL}/api/slot-balance?userId=${urlUserId}&wallet=${urlWallet}&gameName=penaltyshot`);
                const data = await res.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    // মেইন সাইটের আইফ্রেম উইজেটের পেটে ওরিজিনাল টাকা রিয়েল-টাইমে ইনজেক্ট লক চ্যাম!
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                }
            } catch (e) {}
        }
        fetchLivePlayerBalanceSync();

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 50) currentBet -= 50;
            if (action === 'plus' && currentBet < 20000) currentBet += 50;
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        async function handlePenaltyKickShoot() {
            if (isSpinning || isSpinning === true) return; 
            isSpinning = true;
            
            const spinBtn = document.getElementById("spin-btn");
            if (spinBtn) spinBtn.disabled = true; 

            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "⚽ পেনাল্টি কিক মারা হচ্ছে... স্ট্রেইক মাল্টিপ্লায়ার ক্র্যাশ চেকিং সিঙ্কের অপেক্ষা ওস্তাদ...";
            playAudio('click');

            try {
                const response = await fetch(`${SERVER_URL}/api/slot-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: urlUserId, amount: parseFloat(currentBet), wallet: urlWallet, gameName: "penaltyshot" })
                });

                const serverRes = await response.json();
                
                if (serverRes.success || serverRes.success === true) {
                    let targetGamePayload = serverRes.gameData || serverRes;
                    setTimeout(() => {
                        if (serverRes.balance !== undefined) balance = parseFloat(serverRes.balance);
                        showFinalPenaltyReward(targetGamePayload.status, targetGamePayload.winMultiplier, targetGamePayload.winAmount);
                    }, 1200); // কিক মারা ১.২ সেকেন্ডের ধামাকা স্পোর্টিং বাউন্স ফ্রেম লক ওস্তাদ!
                } else {
                    alert(serverRes.message || "❌ আপনার অ্যাকাউন্ট ব্যালেন্স জিরো বা অপ্রতুল! দয়া করে রিচার্জ করুন ওস্তাদ।");
                    stopPenaltyState();
                }
            } catch (err) {
                stopPenaltyState();
            }
        }

        function showFinalPenaltyReward(status, winMultiplier, winAmount) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");
            
            if (status === "win" && winAmount > 0) {
                playAudio('win');
                if (msgBox) msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerHTML = `🎉 <b>গোওওওললল ওস্তাদ!</b> কিপারকে ফাঁকি দিয়ে বল জালে! <b>${winMultiplier}X</b> স্ট্রেইক বোনাস সহ ৳${winAmount} ক্যাশ ওয়ালেটে লক ভাই ভাই!`;
            } else {
                playAudio('wheel');
                if (msgBox) msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerHTML = `💥 ওহ হো মিস ওস্তাদ! কিপার শট সেভ করে ফেলেছে। আবার অন ফায়ার পেনাল্টি শুট মারুন ভাই ভাই!`;
            }

                        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            stopPenaltyState();
            fetchLivePlayerBalanceSync(); // রাউন্ড শেষে নতুন ব্যালেন্স ইনস্ট্যান্ট রিকল লক ভাই ভাই!
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLivePlayerBalanceSync();
                }
            });
        }

        function stopPenaltyState() {
            isSpinning = false;
            const spinBtn = document.getElementById("spin-btn");
            if (spinBtn) spinBtn.disabled = false; 
        }

        const slotSounds = {
            click: new Audio('spin2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('spin2.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) {
            try { if(slotSounds[type]) { slotSounds[type].currentTime = 0; slotSounds[type].play().catch(e => {}); } } catch(e) {}
        }
    </script>
</body>
</html>
